<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Diffy · Run</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@1.0.0-RC.7/bundles/datastar.js"></script>
</head>
<body class="bg-gray-900 text-gray-100">
  <header class="flex items-center gap-3 p-3 border-b border-gray-700 bg-gray-800">
    <h1 class="text-lg font-semibold">Diffy · Run __RUNID__</h1>
    <a href="/" class="text-sm text-sky-400 hover:underline ml-auto">← back to editor</a>
  </header>
  <main class="max-w-2xl mx-auto p-4">
    <div id="run" data-init="@get('/runs/__RUNID__/updates', {retry:'always'})">
      <div class="text-gray-500">connecting…</div>
    </div>
  </main>
</body>
</html>
